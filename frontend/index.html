  <!-- Critical CSS -->
  <style>
    /* Critical: Loading fallback styles */
    #loading-fallback {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
      z-index: 9999;
      transition: opacity 0.3s ease;
    }

    #root {
      min-height: 100vh;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen-Sans, Ubuntu, Cantarell,
        'Helvetica Neue', sans-serif;
      margin: 0;
      padding: 0;
      overflow-x: hidden;
      background: #f8fafc;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* Loading container */
    .loading-container {
      text-align: center;
      padding: 2rem;
      background: white;
      border-radius: 1rem;
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
      animation: fadeIn 0.5s ease;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Logo in loading screen */
    .loading-logo {
      width: 80px;
      height: 80px;
      margin: 0 auto 1.5rem;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
    }

    .loading-logo img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    /* Loading spinner */
    .spinner {
      border: 3px solid #e2e8f0;
      border-top: 3px solid #0ea5e9;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 1.5rem auto;
    }

    @keyframes spin {
      0% {
        transform: rotate(0deg);
      }

      100% {
        transform: rotate(360deg);
      }
    }

    /* Loading text */
    .loading-text {
      color: #334155;
      font-size: 1rem;
      font-weight: 500;
      margin: 0;
    }

    .loading-subtext {
      color: #64748b;
      font-size: 0.875rem;
      margin-top: 0.5rem;
    }

    /* Hide elements initially */
    [hidden] {
      display: none !important;
    }

    /* Logo fallback styles */
    .logo-fallback {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, #0ea5e9, #0369a1);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: bold;
      font-size: 24px;
      margin: 0 auto 1.5rem;
    }
  </style>
</head>

<body>
  <!-- Loading Fallback -->
  <div id="loading-fallback" role="status" aria-label="Loading CareSync EMR application">
    <div class="loading-container">
      <div class="loading-logo">
        <img src="/caresync_logo.PNG" alt="CareSync EMR Logo" loading="eager" id="loading-logo">
      </div>
      <div class="spinner" aria-hidden="true"></div>
      <p class="loading-text" id="loading-text">Loading CareSync EMR...</p>
      <p class="loading-subtext" id="loading-subtext">Modern Healthcare Management System</p>
    </div>
  </div>

  <!-- Main App Container -->
  <div id="root" hidden></div>

  <!-- Main JavaScript Bundle -->
  <script type="module" src="/src/main.jsx" defer></script>

  <!-- Loading Script -->
  <script>
    (function () {
      'use strict';

      // Handle logo loading error
      const loadingLogo = document.getElementById('loading-logo');
      if (loadingLogo) {
        loadingLogo.onerror = function () {
          this.style.display = 'none';
          const fallbackDiv = document.createElement('div');
          fallbackDiv.className = 'logo-fallback';
          fallbackDiv.textContent = 'CS';
          this.parentElement.appendChild(fallbackDiv);
        };
      }

      // DOM ready handler
      document.addEventListener('DOMContentLoaded', function () {
        const fallback = document.getElementById('loading-fallback');
        const root = document.getElementById('root');
        const loadingText = document.getElementById('loading-text');
        const loadingSubtext = document.getElementById('loading-subtext');

        // Show root element
        if (root) {
          root.removeAttribute('hidden');
        }

        // Hide fallback after main app loads
        const hideFallback = function () {
          if (fallback) {
            setTimeout(function () {
              fallback.style.opacity = '0';
              setTimeout(function () {
                fallback.style.display = 'none';
              }, 300);
            }, 200);
          }
        };

        // Fallback timeout
        const fallbackTimeout = setTimeout(function () {
          if (loadingText) {
            loadingText.textContent = 'Taking longer than expected...';
          }
          if (loadingSubtext) {
            loadingSubtext.textContent = 'Please check your internet connection';
          }
          setTimeout(hideFallback, 3000);
        }, 7000);

        // Listen for React app mount
        let appLoaded = false;

        const observer = new MutationObserver(function (mutations) {
          mutations.forEach(function (mutation) {
            if (root && root.children.length > 0 && !appLoaded) {
              appLoaded = true;
              clearTimeout(fallbackTimeout);
              setTimeout(hideFallback, 500);
              observer.disconnect();
            }
          });
        });

        if (root) {
          observer.observe(root, {
            childList: true,
            subtree: true
          });
        }

        // Check periodically
        const checkInterval = setInterval(function () {
          if (root && root.children.length > 0 && !appLoaded) {
            appLoaded = true;
            clearTimeout(fallbackTimeout);
            clearInterval(checkInterval);
            hideFallback();
          }
        }, 100);
      });
    })();
  </script>
</body>

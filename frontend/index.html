  <!-- Delay Sidebar Init until React renders -->
  <script type="module">
    import '/src/main.jsx';

    // Wait until React mounts and sidebar menu exists
    const initSidebar = () => {
      if (window.$ && $(".sidebar-menu").length) {
        if ($.sidebarMenu) {
          $.sidebarMenu($(".sidebar-menu"));
        }
      } else {
        // Retry after short delay if menu not yet present
        setTimeout(initSidebar, 200);
      }
    };

    initSidebar();
  </script>
